name: Release

# Triggered when you push a version tag (e.g., v0.1.0).
# Builds Windows installers, signs them for the auto-updater,
# creates a GitHub Release, and uploads the artifacts + latest.json
# manifest that the in-app updater reads from sokoos.co.ke.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write   # needed to create releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          # Strip leading v
          VERSION_NUM="${VERSION#v}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "Building $VERSION (version $VERSION_NUM)"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & sign Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build --bundles msi,nsis

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          mkdir -p release-assets

          # Find the produced installers
          NSIS_EXE=$(ls src-tauri/target/release/bundle/nsis/*.exe | head -1)
          NSIS_SIG=$(ls src-tauri/target/release/bundle/nsis/*.exe.sig | head -1)

          # Read the signature content
          SIGNATURE=$(cat "$NSIS_SIG")

          # Build the JSON manifest expected by tauri-plugin-updater
          cat > release-assets/latest.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/$(basename $NSIS_EXE)"
              }
            }
          }
          EOF

          # Stage release files (renamed for clarity)
          cp src-tauri/target/release/bundle/msi/*.msi release-assets/
          cp src-tauri/target/release/bundle/nsis/*.exe release-assets/
          cp src-tauri/target/release/bundle/nsis/*.exe.sig release-assets/

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SokoOS ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.msi
            release-assets/*.exe
            release-assets/*.exe.sig
            release-assets/latest.json
