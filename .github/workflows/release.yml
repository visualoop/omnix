name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag to build (e.g. v0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  release:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          VERSION_NUM="${VERSION#v}"
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "version=$VERSION_NUM" >> $GITHUB_OUTPUT
          echo "Building $VERSION (version $VERSION_NUM)"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild installer BMPs from SVG sources
        run: pnpm build:installer-images

      - name: Build & sign Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build --bundles msi,nsis

      - name: Generate updater manifest (latest.json)
        shell: bash
        run: |
          mkdir -p release-assets

          UPDATER_ZIP=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip | head -1)
          UPDATER_SIG=$(ls src-tauri/target/release/bundle/nsis/*.nsis.zip.sig | head -1)

          if [ -z "$UPDATER_ZIP" ] || [ -z "$UPDATER_SIG" ]; then
            echo "ERROR: Updater artifacts not found. Did createUpdaterArtifacts run?"
            ls -la src-tauri/target/release/bundle/nsis/
            exit 1
          fi

          SIGNATURE=$(cat "$UPDATER_SIG")
          ZIP_NAME=$(basename "$UPDATER_ZIP")

          cat > release-assets/latest.json <<EOF
          {
            "version": "${{ steps.version.outputs.version }}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}/$ZIP_NAME"
              }
            }
          }
          EOF

          cp src-tauri/target/release/bundle/msi/*.msi release-assets/
          cp src-tauri/target/release/bundle/nsis/*.exe release-assets/
          cp "$UPDATER_ZIP" release-assets/
          cp "$UPDATER_SIG" release-assets/

          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: SokoOS ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.msi
            release-assets/*.exe
            release-assets/*.nsis.zip
            release-assets/*.nsis.zip.sig
            release-assets/latest.json
