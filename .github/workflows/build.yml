name: Build (Windows)

# Builds Windows installers (.msi and .exe) on every push to main and PR.
# For tagged releases (e.g. v0.1.0), use the release.yml workflow which
# also publishes a GitHub Release.

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "brand/**"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild installer BMPs from SVG sources
        run: pnpm build:installer-images

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Run Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build Tauri app
        env:
          # Updater signing (set via repo secrets — see docs/CI_SECRETS.md)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build --bundles msi,nsis

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: SokoOS-Windows-MSI
          path: src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: SokoOS-Windows-NSIS
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload updater artifacts (zip + sig)
        uses: actions/upload-artifact@v4
        with:
          name: SokoOS-Updater-Artifacts
          path: |
            src-tauri/target/release/bundle/nsis/*.zip
            src-tauri/target/release/bundle/nsis/*.zip.sig
            src-tauri/target/release/bundle/msi/*.zip
            src-tauri/target/release/bundle/msi/*.zip.sig
          if-no-files-found: warn
          retention-days: 30
