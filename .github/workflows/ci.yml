name: CI

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional: tag a release (e.g. v0.1.3). Leave blank to build artifacts only."
        required: false
        type: string

# Dedupe runs by commit SHA so retagging or force-pushing same commit
# doesn't cause concurrent duplicate work.
concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Decide if this run produces a GitHub Release.
      # Yes when: pushing a tag like v1.2.3 OR workflow_dispatch with release_version.
      - name: Resolve release context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.release_version }}" ]; then
            TAG="${{ inputs.release_version }}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node (with pnpm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Rebuild installer BMPs from SVG sources
        run: pnpm build:installer-images

      - name: Type-check frontend
        run: pnpm exec tsc --noEmit

      - name: Run Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build & sign Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm exec tauri build -- --bundles msi,nsis

      # ─── Branch / PR / non-tag pushes: upload as artifacts only ───
      - name: Upload MSI installer (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Windows-MSI
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS installer (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Windows-NSIS
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload updater signatures (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Updater-Signatures
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn
          retention-days: 30

      # ─── Tag pushes / workflow_dispatch with version: also publish release ───
      - name: Generate updater manifest (latest.json)
        if: steps.ctx.outputs.is_release == 'true'
        shell: bash
        run: |
          mkdir -p release-assets

          INSTALLER=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
          SIG_FILE=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe.sig 2>/dev/null | head -1)

          if [ -z "$INSTALLER" ] || [ -z "$SIG_FILE" ]; then
            echo "ERROR: NSIS installer or signature not found"
            ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/ || true
            ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/ || true
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          INSTALLER_NAME=$(basename "$INSTALLER")

          cat > release-assets/latest.json <<EOF
          {
            "version": "${{ steps.ctx.outputs.version }}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${{ steps.ctx.outputs.tag }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.ctx.outputs.tag }}/$INSTALLER_NAME"
              }
            }
          }
          EOF

          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig release-assets/ 2>/dev/null || true

          ls -la release-assets/

      - name: Create GitHub Release
        if: steps.ctx.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ctx.outputs.tag }}
          name: Omnix ${{ steps.ctx.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.ctx.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.msi
            release-assets/*.msi.sig
            release-assets/*.exe
            release-assets/*.exe.sig
            release-assets/latest.json

      # ─── Notify Payload (omnix.co.ke) so the in-app updater + downloads page
      #     pick up the release. Requires PAYLOAD_SYSTEM_TOKEN repo secret.
      #     Best-effort: a Payload outage shouldn't block the GitHub release,
      #     so this step continues on error and prints diagnostics.
      - name: Notify Payload
        if: steps.ctx.outputs.is_release == 'true'
        continue-on-error: true
        shell: bash
        env:
          PAYLOAD_SYSTEM_TOKEN: ${{ secrets.PAYLOAD_SYSTEM_TOKEN }}
          PAYLOAD_BASE: ${{ vars.PAYLOAD_BASE_URL || 'https://omnix.co.ke' }}
          VERSION: ${{ steps.ctx.outputs.version }}
          TAG: ${{ steps.ctx.outputs.tag }}
          REPO: ${{ github.repository }}
        run: |
          set -e

          if [ -z "$PAYLOAD_SYSTEM_TOKEN" ]; then
            echo "PAYLOAD_SYSTEM_TOKEN secret is not configured — skipping Payload notify."
            echo "Set the GitHub Actions repo secret 'PAYLOAD_SYSTEM_TOKEN' to enable in-app updater + CMS-tracked releases."
            exit 0
          fi

          NSIS=$(ls release-assets/*-setup.exe 2>/dev/null | head -1)
          MSI=$(ls release-assets/*.msi 2>/dev/null | head -1)
          NSIS_SIG_FILE=$(ls release-assets/*-setup.exe.sig 2>/dev/null | head -1)

          if [ -z "$NSIS" ] || [ -z "$NSIS_SIG_FILE" ]; then
            echo "ERROR: NSIS installer or signature missing in release-assets/" >&2
            ls -la release-assets/ || true
            exit 1
          fi

          NSIS_NAME=$(basename "$NSIS")
          MSI_NAME=$(basename "$MSI" 2>/dev/null || echo "")
          NSIS_URL="https://github.com/$REPO/releases/download/$TAG/$NSIS_NAME"
          MSI_URL=""
          if [ -n "$MSI_NAME" ]; then
            MSI_URL="https://github.com/$REPO/releases/download/$TAG/$MSI_NAME"
          fi

          NSIS_SIZE=$(stat -c '%s' "$NSIS" 2>/dev/null || stat -f '%z' "$NSIS")
          MSI_SIZE=0
          if [ -n "$MSI" ]; then
            MSI_SIZE=$(stat -c '%s' "$MSI" 2>/dev/null || stat -f '%z' "$MSI")
          fi

          NSIS_SHA=$(sha256sum "$NSIS" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$NSIS" | awk '{print $1}')
          MSI_SHA=""
          if [ -n "$MSI" ]; then
            MSI_SHA=$(sha256sum "$MSI" 2>/dev/null | awk '{print $1}' || shasum -a 256 "$MSI" | awk '{print $1}')
          fi

          SIGNATURE=$(cat "$NSIS_SIG_FILE")
          MAJOR="${VERSION%%.*}"
          # Pre-release marker (e.g. 1.0.0-beta.2) → channel beta
          CHANNEL=stable
          [[ "$TAG" == *-* ]] && CHANNEL=beta

          # Compose JSON body via jq for safe escaping.
          BODY=$(jq -n \
            --arg version "$VERSION" \
            --argjson major "$MAJOR" \
            --arg channel "$CHANNEL" \
            --arg tag "$TAG" \
            --arg nsisUrl "$NSIS_URL" \
            --arg msiUrl "$MSI_URL" \
            --argjson nsisSize "$NSIS_SIZE" \
            --argjson msiSize "$MSI_SIZE" \
            --arg nsisSha "$NSIS_SHA" \
            --arg msiSha "$MSI_SHA" \
            --arg sig "$SIGNATURE" \
            --arg title "Omnix v$VERSION" \
            --arg summary "See https://github.com/$REPO/releases/tag/$TAG for the full changelog." \
            '{
              version: $version,
              majorVersion: $major,
              channel: $channel,
              gitTag: $tag,
              windowsNsisUrl: $nsisUrl,
              windowsMsiUrl: ($msiUrl | select(. != "")),
              windowsNsisSize: $nsisSize,
              windowsMsiSize: ($msiSize | select(. > 0)),
              sha256Nsis: $nsisSha,
              sha256Msi: ($msiSha | select(. != "")),
              updaterSignature: $sig,
              title: $title,
              summary: $summary,
              forcePublish: true
            } | with_entries(select(.value != null))')

          echo "POSTing release $VERSION → $PAYLOAD_BASE/api/releases"
          HTTP_CODE=$(curl -s -o /tmp/payload-resp.json -w "%{http_code}" \
            -X POST "$PAYLOAD_BASE/api/releases" \
            -H "x-system-token: $PAYLOAD_SYSTEM_TOKEN" \
            -H "Content-Type: application/json" \
            -d "$BODY")
          echo "Response ($HTTP_CODE):"
          cat /tmp/payload-resp.json || true
          echo
          [ "$HTTP_CODE" = "200" ] || { echo "Payload notify failed (HTTP $HTTP_CODE)"; exit 1; }
