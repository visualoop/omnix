name: CI

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_version:
        description: "Optional: tag a release (e.g. v0.1.3). Leave blank to build artifacts only."
        required: false
        type: string

# Dedupe runs by commit SHA so retagging or force-pushing same commit
# doesn't cause concurrent duplicate work.
concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Decide if this run produces a GitHub Release.
      # Yes when: pushing a tag like v1.2.3 OR workflow_dispatch with release_version.
      - name: Resolve release context
        id: ctx
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          elif [ -n "${{ inputs.release_version }}" ]; then
            TAG="${{ inputs.release_version }}"
            echo "is_release=true" >> $GITHUB_OUTPUT
            echo "tag=$TAG" >> $GITHUB_OUTPUT
            echo "version=${TAG#v}" >> $GITHUB_OUTPUT
          else
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "tag=" >> $GITHUB_OUTPUT
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node (with npm cache)
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Rebuild installer BMPs from SVG sources
        run: npm run build:installer-images

      - name: Type-check frontend
        run: npm exec tsc --noEmit

      - name: Run Rust unit tests
        working-directory: src-tauri
        run: cargo test --lib

      - name: Build & sign Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm exec tauri build --bundles msi,nsis

      # ─── Branch / PR / non-tag pushes: upload as artifacts only ───
      - name: Upload MSI installer (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Windows-MSI
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          if-no-files-found: error
          retention-days: 30

      - name: Upload NSIS installer (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Windows-NSIS
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload updater signatures (artifact)
        if: steps.ctx.outputs.is_release != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: Omnix-Updater-Signatures
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig
          if-no-files-found: warn
          retention-days: 30

      # ─── Tag pushes / workflow_dispatch with version: also publish release ───
      - name: Generate updater manifest (latest.json)
        if: steps.ctx.outputs.is_release == 'true'
        shell: bash
        run: |
          mkdir -p release-assets

          INSTALLER=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
          SIG_FILE=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe.sig 2>/dev/null | head -1)

          if [ -z "$INSTALLER" ] || [ -z "$SIG_FILE" ]; then
            echo "ERROR: NSIS installer or signature not found"
            ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/ || true
            ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/ || true
            exit 1
          fi

          SIGNATURE=$(cat "$SIG_FILE")
          INSTALLER_NAME=$(basename "$INSTALLER")

          cat > release-assets/latest.json <<EOF
          {
            "version": "${{ steps.ctx.outputs.version }}",
            "notes": "See https://github.com/${{ github.repository }}/releases/tag/${{ steps.ctx.outputs.tag }}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "$SIGNATURE",
                "url": "https://github.com/${{ github.repository }}/releases/download/${{ steps.ctx.outputs.tag }}/$INSTALLER_NAME"
              }
            }
          }
          EOF

          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi.sig release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe release-assets/ 2>/dev/null || true
          cp src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe.sig release-assets/ 2>/dev/null || true

          ls -la release-assets/

      - name: Create GitHub Release
        if: steps.ctx.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ctx.outputs.tag }}
          name: Omnix ${{ steps.ctx.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.ctx.outputs.tag, '-') }}
          generate_release_notes: true
          files: |
            release-assets/*.msi
            release-assets/*.msi.sig
            release-assets/*.exe
            release-assets/*.exe.sig
            release-assets/latest.json
