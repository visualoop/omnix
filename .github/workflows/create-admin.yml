name: Create First Admin (one-shot)

# Manual one-shot: creates an owner-role user in the `users` collection so
# /admin login works on first deploy. Idempotent — re-running with the same
# email is a no-op.

on:
  workflow_dispatch:
    inputs:
      email:
        description: 'Admin email (must match the user you logged in with if upgrading)'
        required: true
        type: string
      password:
        description: 'Optional: new password (leave blank to upgrade existing user without changing password)'
        required: false
        type: string
      name:
        description: 'Display name'
        required: false
        default: 'Admin'
        type: string

jobs:
  ensure-admin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Create admin
        working-directory: website
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET }}
          ADMIN_EMAIL: ${{ inputs.email }}
          ADMIN_PASSWORD: ${{ inputs.password }}
          ADMIN_NAME: ${{ inputs.name }}
        run: pnpm exec tsx scripts/ensure-admin.mts
