<?xml version="1.0" encoding="UTF-8"?>
<!-- NSIS installer header banner: 150x57px, displayed at top of inner pages -->
<svg xmlns="http://www.w3.org/2000/svg" width="150" height="57" viewBox="0 0 150 57">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed dark background -->
  <rect x="0" y="0" width="150" height="57" fill="url(#bg)"/>

  <!-- Logo mark on the right side (S in rounded square) -->
  <g transform="translate(110, 8)">
    <rect x="0" y="0" width="36" height="40" rx="8" ry="8" fill="rgba(255,255,255,0.08)"/>
    <path
      d="M 28 13
         C 28 9, 24 7, 18 7
         C 12 7, 8 10, 8 14
         C 8 18, 11 19, 18 20
         C 25 21, 28 23, 28 27
         C 28 31, 24 33, 18 33
         C 12 33, 8 31, 8 27"
      fill="none"
      stroke="url(#accent)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Product name -->
  <text x="14" y="28"
        font-family="Arial, sans-serif"
        font-size="16"
        font-weight="700"
        fill="#FFFFFF"
        letter-spacing="-0.5">SokoOS</text>
  <text x="14" y="44"
        font-family="Arial, sans-serif"
        font-size="9"
        fill="#94A3B8"
        letter-spacing="0.5">ERP Platform</text>
</svg>
