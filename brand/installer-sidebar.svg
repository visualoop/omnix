<?xml version="1.0" encoding="UTF-8"?>
<!-- NSIS installer sidebar: 164x314px, displayed on welcome and finish pages -->
<svg xmlns="http://www.w3.org/2000/svg" width="164" height="314" viewBox="0 0 164 314">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="60%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="164" height="314" fill="url(#bg)"/>
  <!-- Soft glow behind the logo -->
  <rect x="0" y="0" width="164" height="314" fill="url(#glow)"/>

  <!-- Big centered logo (rounded square + S) -->
  <g transform="translate(38, 70)">
    <rect x="0" y="0" width="88" height="88" rx="20" ry="20" fill="rgba(255,255,255,0.06)" stroke="rgba(96,165,250,0.3)" stroke-width="1"/>
    <path
      d="M 70 30
         C 70 21, 60 16, 44 16
         C 28 16, 18 22, 18 30
         C 18 38, 26 41, 44 44
         C 62 47, 70 52, 70 60
         C 70 68, 60 73, 44 73
         C 28 73, 18 68, 18 60"
      fill="none"
      stroke="url(#accent)"
      stroke-width="11"
      stroke-linecap="round"
      stroke-linejoin="round"/>
  </g>

  <!-- Product name -->
  <text x="82" y="190"
        font-family="Arial, sans-serif"
        font-size="22"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-0.5">SokoOS</text>
  <text x="82" y="210"
        font-family="Arial, sans-serif"
        font-size="10"
        fill="#94A3B8"
        text-anchor="middle"
        letter-spacing="2">ERP PLATFORM</text>

  <!-- Tagline -->
  <text x="82" y="248"
        font-family="Arial, sans-serif"
        font-size="9"
        fill="#64748B"
        text-anchor="middle">Offline-first business OS</text>
  <text x="82" y="262"
        font-family="Arial, sans-serif"
        font-size="9"
        fill="#64748B"
        text-anchor="middle">for Kenyan SMEs</text>

  <!-- Bottom accent line -->
  <rect x="40" y="290" width="84" height="2" rx="1" fill="url(#accent)" opacity="0.6"/>
</svg>
