<?xml version="1.0" encoding="UTF-8"?>
<!-- NSIS installer sidebar: 164x314px, displayed on welcome and finish pages -->
<svg xmlns="http://www.w3.org/2000/svg" width="164" height="314" viewBox="0 0 164 314">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="55%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#1E40AF"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="164" height="314" fill="url(#bg)"/>
  <!-- Soft glow behind the logo -->
  <rect x="0" y="0" width="164" height="314" fill="url(#glow)"/>

  <!-- Big centered Omnix mark: 88px squircle with 6-segment ring + core -->
  <g transform="translate(38, 70) scale(0.172)">
    <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="rgba(255,255,255,0.07)" stroke="rgba(96,165,250,0.3)" stroke-width="4"/>
    <g fill="#FFFFFF">
      <path d="M 266.46 56.55 A 200 200 0 0 1 437.65 156.30 L 372.74 193.60 A 130 130 0 0 0 261.35 128.76 Z"/>
      <path d="M 442.80 165.23 A 200 200 0 0 1 442.80 346.77 L 374.82 318.53 A 130 130 0 0 0 374.82 193.47 Z"/>
      <path d="M 437.65 355.70 A 200 200 0 0 1 266.46 455.45 L 261.35 383.24 A 130 130 0 0 0 372.74 318.40 Z"/>
      <path d="M 245.54 455.45 A 200 200 0 0 1 74.35 355.70 L 139.26 318.40 A 130 130 0 0 0 250.65 383.24 Z"/>
      <path d="M 69.20 346.77 A 200 200 0 0 1 69.20 165.23 L 137.18 193.47 A 130 130 0 0 0 137.18 318.53 Z"/>
      <path d="M 74.35 156.30 A 200 200 0 0 1 245.54 56.55 L 250.65 128.76 A 130 130 0 0 0 139.26 193.60 Z"/>
    </g>
    <circle cx="256" cy="256" r="42" fill="#FFFFFF"/>
  </g>

  <!-- Product name -->
  <text x="82" y="190"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="24"
        font-weight="700"
        fill="#FFFFFF"
        text-anchor="middle"
        letter-spacing="-0.5">Omnix</text>
  <text x="82" y="208"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="9"
        fill="#94A3B8"
        text-anchor="middle"
        letter-spacing="2.5">DESKTOP ERP</text>

  <!-- Tagline -->
  <text x="82" y="248"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="9"
        fill="#64748B"
        text-anchor="middle">Offline-first ERP</text>
  <text x="82" y="262"
        font-family="Segoe UI, Arial, sans-serif"
        font-size="9"
        fill="#64748B"
        text-anchor="middle">for Kenyan SMEs</text>

  <!-- Bottom accent line -->
  <rect x="40" y="290" width="84" height="2" rx="1" fill="#60A5FA" opacity="0.6"/>
</svg>
