version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe
    steps:
      - checkout

      # Image already has Node.js 24.9.0 pre-installed.
      # Do NOT install another Node.js — mixing versions corrupts npm's bundled modules.
      - run:
          name: Show pre-installed tooling
          command: |
            node --version
            npm --version
            rustc --version

      - run:
          name: Setup Rust and build tools
          command: |
            # Install mingw for dlltool.exe (needed by raw-dylib imports in windows-sys, parking_lot_core)
            choco install mingw -y --no-progress

            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            rustup default stable-x86_64-pc-windows-msvc
            rustup component add llvm-tools-preview

            # Find dlltool.exe from mingw and persist to CIRCLE_SHELL_ENV (survives across steps)
            $dlltoolDir = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
            if (-not (Test-Path "$dlltoolDir\dlltool.exe")) {
              $found = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\mingw" -Recurse -Filter "dlltool.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) { $dlltoolDir = Split-Path $found.FullName -Parent }
              else { Write-Error "dlltool.exe not found after mingw install"; exit 1 }
            }
            Write-Host "dlltool found at: $dlltoolDir\dlltool.exe"

            # Find lld-link from llvm-tools-preview
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
            $lldLinkDir = if ($lldLink) { Split-Path $lldLink.FullName -Parent } else { "" }

            # Persist env vars via CIRCLE_SHELL_ENV so all subsequent steps inherit them
            Add-Content $env:CIRCLE_SHELL_ENV "`$env:RUSTFLAGS=`"-Cdlltool=$dlltoolDir\dlltool.exe`""
            # Add lld-link dir to PATH if found
            if ($lldLinkDir) {
              Add-Content $env:CIRCLE_SHELL_ENV "`$env:Path=`"$lldLinkDir;`$env:Path`""
            }
            # Keep mingw OFF the PATH so gcc.exe doesn't confuse the cc crate (dlltool is passed via RUSTFLAGS)
            Add-Content $env:CIRCLE_SHELL_ENV "`$env:Path=(`$env:Path.Split(';') | Where-Object { `$_ -notmatch '[Mm]ingw' }) -join ';'"

      # Exclude website/ (separate project), node_modules, .git to speed copy and avoid confusion
      - run:
          name: Copy source to short path
          command: |
            if (Test-Path C:\build) { Remove-Item -Recurse -Force C:\build }
            robocopy . C:\build /E /XD website node_modules .next .git; if ($LastExitCode -ge 8) { exit $LastExitCode } else { exit 0 }

      - run:
          name: Install dependencies
          command: |
            Set-Location C:\build
            npm ci

      - run:
          name: Type check
          command: |
            Set-Location C:\build
            npm run type-check

      - run:
          name: Build installer images
          command: |
            Set-Location C:\build
            npm run build:installer-images

      - run:
          name: Build Windows installer
          command: |
            Set-Location C:\build
            npm run tauri -- build --bundles msi nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle
          destination: installer

workflows:
  build:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
