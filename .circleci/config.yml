version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe
    steps:
      - checkout

      - run:
          name: Setup Node.js 20
          command: |
            Invoke-WebRequest -Uri https://nodejs.org/dist/v20.18.0/node-v20.18.0-x64.msi -OutFile node-installer.msi
            Start-Process msiexec.exe -ArgumentList '/i', 'node-installer.msi', '/quiet', '/norestart' -Wait
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            node --version
            npm --version

      - run:
          name: Install pnpm
          command: |
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            npm install -g pnpm@9
            pnpm --version

      - run:
          name: Setup Rust with LLVM linker
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            rustup default stable-x86_64-pc-windows-msvc
            rustup component add llvm-tools-preview
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
              Write-Host "lld-link found at: $($lldLink.FullName)"
            } else {
              Write-Host "WARNING: lld-link not found"
            }

      - run:
          name: Copy to short path
          command: |
            Copy-Item -Path . -Destination C:\build -Recurse -Force

      - run:
          name: Install dependencies
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm install --frozen-lockfile

      - run:
          name: Type check
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm run type-check

      - run:
          name: Build installer images
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm run build:installer-images

      - run:
          name: Build Windows installer
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm tauri build --bundles msi nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle
          destination: installer

workflows:
  build:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
