version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe

    steps:
      - checkout

      - run:
          name: Install Node.js
          command: |
            choco install nodejs --version=20.18.0 -y --no-progress
            refreshenv
            node --version
            npm --version

      - run:
          name: Install Rust
          command: |
            Invoke-WebRequest -Uri https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable --profile minimal
            rustc --version

      - run:
          name: Shorten build dir (fix MSVC link.exe 32K argument limit)
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            mkdir C:\build -Force
            Copy-Item -Path . -Destination C:\build -Recurse
            Set-Location C:\build

            rustup target add x86_64-pc-windows-msvc
            cargo check
            Write-Host "Rust check passed"

      - run:
          name: Build Windows installers
          command: |
            $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
            Set-Location C:\build
            npm install
            npm run build:installer-images
            npx tsc --noEmit
            npx tauri build --bundles msi,nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle\msi
          destination: windows-msi

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle\nsis
          destination: windows-nsis

      - when:
          condition:
            matches:
              pattern: "^v.*"
              value: << pipeline.git.tag >>
          steps:
            - run:
                name: Install GitHub CLI
                command: choco install gh -y --no-progress
            - run:
                name: Publish GitHub Release
                command: |
                  $env:Path = "$env:USERPROFILE\.cargo\bin;$env:Path"
                  Set-Location C:\build
                  $TAG = $env:CIRCLE_TAG
                  $VERSION = $TAG -replace '^v',''
                  mkdir release-assets -Force
                  $INSTALLER = Get-ChildItem src-tauri\target\release\bundle\nsis\*setup.exe | Select-Object -First 1
                  $INSTALLER_NAME = $INSTALLER.Name
                  $SIG = Get-ChildItem src-tauri\target\release\bundle\nsis\*.sig | Select-Object -First 1
                  $SIGNATURE = Get-Content $SIG.FullName -Raw
                  $PUB_DATE = (Get-Date).ToUniversalTime().ToString('yyyy-MM-ddTHH:mm:ssZ')
                  $JSON = '{"version":"' + $VERSION + '","notes":"https://github.com/justinelut/omnix/releases/tag/' + $TAG + '","pub_date":"' + $PUB_DATE + '","platforms":{"windows-x86_64":{"signature":"' + $SIGNATURE.Trim() + '","url":"https://github.com/justinelut/omnix/releases/download/' + $TAG + '/' + $INSTALLER_NAME + '"}}}'
                  $JSON | Out-File -FilePath release-assets\latest.json -Encoding utf8
                  echo $env:GITHUB_TOKEN | gh auth login --with-token
                  gh release create $TAG src-tauri\target\release\bundle\msi\*.msi src-tauri\target\release\bundle\nsis\*.exe release-assets\latest.json --title "Omnix $TAG" --generate-notes --repo justinelut/omnix

workflows:
  build:
    jobs:
      - build-windows
