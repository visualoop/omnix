version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe
    steps:
      - checkout

      # Image already has Node.js 24.9.0 pre-installed.
      # Do NOT install another Node.js — mixing versions corrupts npm's bundled modules.
      - run:
          name: Show pre-installed tooling
          command: |
            node --version
            npm --version
            rustc --version

      - run:
          name: Setup Rust and build tools
          command: |
            # Install Visual Studio Build Tools with C++ workload (provides cl.exe for ring crate)
            choco install visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended --quiet" -y --no-progress

            # Install MSYS2 for dlltool.exe
            choco install msys2 -y --no-progress
            C:\tools\msys64\usr\bin\bash.exe -lc "pacman -Syu --noconfirm"
            C:\tools\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-binutils"
            
            $dlltoolPath = "C:\tools\msys64\mingw64\bin\dlltool.exe"
            if (-not (Test-Path $dlltoolPath)) {
              Write-Error "dlltool.exe not found at $dlltoolPath"; exit 1
            }
            Write-Host "dlltool found at: $dlltoolPath"

            # Install Rust with MSVC toolchain
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y --default-toolchain stable-x86_64-pc-windows-msvc
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            
            rustup default stable-x86_64-pc-windows-msvc
            rustup show

            # Persist RUSTFLAGS via CIRCLE_SHELL_ENV
            Add-Content $env:CIRCLE_SHELL_ENV "`$env:RUSTFLAGS=`"-Cdlltool=$dlltoolPath`""

      # Exclude website/ (separate project), node_modules, .git to speed copy and avoid confusion
      - run:
          name: Copy source to short path
          command: |
            if (Test-Path C:\build) { Remove-Item -Recurse -Force C:\build }
            robocopy . C:\build /E /XD website node_modules .next .git; if ($LastExitCode -ge 8) { exit $LastExitCode } else { exit 0 }

      - run:
          name: Install dependencies
          command: |
            Set-Location C:\build
            npm ci

      - run:
          name: Type check
          command: |
            Set-Location C:\build
            npm run type-check

      - run:
          name: Build installer images
          command: |
            Set-Location C:\build
            npm run build:installer-images

      - run:
          name: Build Windows installer
          command: |
            Set-Location C:\build
            $env:RUSTFLAGS = "-Cdlltool=C:\tools\msys64\mingw64\bin\dlltool.exe"
            rustup show
            npm run tauri -- build --bundles msi nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle
          destination: installer

workflows:
  build:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
