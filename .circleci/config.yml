version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: bash.exe

    steps:
      - checkout

      - run:
          name: Install Node.js
          command: choco install nodejs --version=20.18.0 -y --no-progress

      - run:
          name: Install pnpm
          command: npm install -g pnpm@9

      - run:
          name: Install Rust
          command: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
            echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            source $BASH_ENV
            rustup target add x86_64-pc-windows-msvc

      - restore_cache:
          keys:
            - rust-cache-v1-{{ checksum "src-tauri/Cargo.lock" }}
            - rust-cache-v1-

      - run:
          name: Install deps
          command: pnpm install --frozen-lockfile

      - run:
          name: Rebuild installer images
          command: pnpm build:installer-images

      - run:
          name: Type-check
          command: npx tsc --noEmit

      - run:
          name: Build Windows installers
          command: |
            export PATH="$HOME/.cargo/bin:$PATH"
            pnpm tauri build --bundles msi,nsis

      - save_cache:
          paths:
            - "C:\\Users\\circleci\\.cargo"
            - "src-tauri\\target"
          key: rust-cache-v1-{{ checksum "src-tauri/Cargo.lock" }}

      - store_artifacts:
          path: src-tauri/target/release/bundle/msi
          destination: windows-msi

      - store_artifacts:
          path: src-tauri/target/release/bundle/nsis
          destination: windows-nsis

      - when:
          condition:
            matches:
              pattern: "^v.*"
              value: << pipeline.git.tag >>
          steps:
            - run:
                name: Install GitHub CLI
                command: choco install gh -y --no-progress

            - run:
                name: Generate manifest and publish GitHub Release
                command: |
                  TAG="$CIRCLE_TAG"
                  VERSION="${TAG#v}"
                  mkdir -p release-assets

                  INSTALLER=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
                  SIG_FILE=$(ls src-tauri/target/release/bundle/nsis/*-setup.exe.sig 2>/dev/null | head -1)
                  INSTALLER_NAME=$(basename "$INSTALLER")
                  SIGNATURE=$(cat "$SIG_FILE")
                  PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)

                  printf '{\n  "version": "%s",\n  "notes": "https://github.com/justinelut/omnix/releases/tag/%s",\n  "pub_date": "%s",\n  "platforms": {\n    "windows-x86_64": {\n      "signature": "%s",\n      "url": "https://github.com/justinelut/omnix/releases/download/%s/%s"\n    }\n  }\n}\n' \
                    "$VERSION" "$TAG" "$PUB_DATE" "$SIGNATURE" "$TAG" "$INSTALLER_NAME" \
                    > release-assets/latest.json

                  echo "$GITHUB_TOKEN" | gh auth login --with-token
                  gh release create "$TAG" \
                    src-tauri/target/release/bundle/msi/*.msi \
                    src-tauri/target/release/bundle/nsis/*.exe \
                    release-assets/latest.json \
                    --title "Omnix $TAG" \
                    --generate-notes \
                    --repo justinelut/omnix

workflows:
  build:
    jobs:
      - build-windows:
