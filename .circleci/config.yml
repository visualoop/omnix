version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe
    steps:
      - checkout

      # Image already has Node.js 24.9.0 pre-installed.
      # Do NOT install another Node.js — mixing versions corrupts npm's bundled modules.
      - run:
          name: Show pre-installed tooling
          command: |
            node --version
            npm --version
            rustc --version

      - run:
          name: Setup Rust and build tools
          command: |
            # Install mingw for dlltool.exe (needed by raw-dylib imports in windows-sys, parking_lot_core)
            choco install mingw -y --no-progress

            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            rustup default stable-x86_64-pc-windows-msvc
            rustup component add llvm-tools-preview

            # lld-link is in llvm-tools-preview's lib path, not on PATH — add it
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
              Write-Host "lld-link found at: $($lldLink.FullName)"
            } else {
              Write-Host "WARNING: lld-link not found"
            }

            # Find dlltool.exe and persist its path as RUSTFLAGS so cargo passes -Cdlltool to rustc.
            $dlltoolDir = "C:\ProgramData\chocolatey\lib\mingw\tools\install\mingw64\bin"
            if (Test-Path "$dlltoolDir\dlltool.exe") {
              $dlltoolPath = "$dlltoolDir\dlltool.exe"
              [Environment]::SetEnvironmentVariable("RUSTFLAGS", "-Cdlltool=$dlltoolPath", "User")
              $env:RUSTFLAGS = "-Cdlltool=$dlltoolPath"
              Write-Host "dlltool found at: $dlltoolPath"
              Write-Host "RUSTFLAGS set to: $env:RUSTFLAGS"
            } else {
              Write-Host "WARNING: dlltool not found at $dlltoolDir — searching..."
              $found = Get-ChildItem -Path "C:\ProgramData\chocolatey\lib\mingw" -Recurse -Filter "dlltool.exe" | Select-Object -First 1
              if ($found) {
                $dlltoolPath = $found.FullName
                [Environment]::SetEnvironmentVariable("RUSTFLAGS", "-Cdlltool=$dlltoolPath", "User")
                $env:RUSTFLAGS = "-Cdlltool=$dlltoolPath"
                Write-Host "dlltool found at: $dlltoolPath"
                Write-Host "RUSTFLAGS set to: $env:RUSTFLAGS"
              } else {
                Write-Host "ERROR: dlltool.exe not found anywhere"
              }
            }

            # Strip mingw from PATH so gcc.exe doesn't confuse the cc crate
            $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch '[Mm]ingw' }) -join ';'

      # Exclude website/ (separate project), node_modules, .git to speed copy and avoid confusion
      - run:
          name: Copy source to short path
          command: |
            if (Test-Path C:\build) { Remove-Item -Recurse -Force C:\build }
            robocopy . C:\build /E /XD website node_modules .next .git; if ($LastExitCode -ge 8) { exit $LastExitCode } else { exit 0 }

      - run:
          name: Install dependencies
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $env:RUSTFLAGS = [Environment]::GetEnvironmentVariable("RUSTFLAGS", "User")
            $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch '[Mm]ingw' }) -join ';'
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            npm ci

      - run:
          name: Type check
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch '[Mm]ingw' }) -join ';'
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            npm run type-check

      - run:
          name: Build installer images
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $env:RUSTFLAGS = [Environment]::GetEnvironmentVariable("RUSTFLAGS", "User")
            $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch '[Mm]ingw' }) -join ';'
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            npm run build:installer-images

      - run:
          name: Build Windows installer
          command: |
            Set-Location C:\build
            $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("Path","User")
            $env:RUSTFLAGS = [Environment]::GetEnvironmentVariable("RUSTFLAGS", "User")
            $env:Path = ($env:Path.Split(';') | Where-Object { $_ -notmatch '[Mm]ingw' }) -join ';'
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            npm run tauri -- build --bundles msi nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle
          destination: installer

workflows:
  build:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
