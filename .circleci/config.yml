version: 2.1

jobs:
  build-windows:
    machine:
      image: windows-server-2025-gui:current
      resource_class: windows.medium
      shell: powershell.exe
    steps:
      - checkout

      - run:
          name: Setup Node.js
          command: |
            choco install nodejs-lts -y
            refreshenv
            npm install -g pnpm

      - run:
          name: Setup Rust with LLVM linker
          command: |
            Invoke-WebRequest -Uri https://win.rustup.rs -OutFile rustup-init.exe
            .\rustup-init.exe -y
            refreshenv
            rustup default stable-x86_64-pc-windows-msvc
            rustup component add llvm-tools-preview
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              [Environment]::SetEnvironmentVariable("Path", "$lldLinkDir;$env:Path", "Process")
              Write-Host "lld-link found at: $lldLink.FullName"
            } else {
              Write-Host "WARNING: lld-link not found"
            }

      - run:
          name: Copy to short path
          command: |
            Copy-Item -Path . -Destination C:\build -Recurse -Force

      - run:
          name: Install dependencies
          command: |
            Set-Location C:\build
            refreshenv
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm install --frozen-lockfile

      - run:
          name: Type check
          command: |
            Set-Location C:\build
            refreshenv
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm tsc --noEmit

      - run:
          name: Build installer images
          command: |
            Set-Location C:\build
            refreshenv
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm build:installer-images

      - run:
          name: Build Windows installer
          command: |
            Set-Location C:\build
            refreshenv
            $lldLink = Get-ChildItem -Path "$env:USERPROFILE\.rustup\toolchains" -Recurse -Filter "lld-link.exe" | Select-Object -First 1
            if ($lldLink) {
              $lldLinkDir = Split-Path $lldLink.FullName -Parent
              $env:Path = "$lldLinkDir;$env:Path"
            }
            pnpm tauri build --bundles msi nsis

      - store_artifacts:
          path: C:\build\src-tauri\target\release\bundle
          destination: installer

workflows:
  build:
    jobs:
      - build-windows:
          filters:
            tags:
              only: /^v.*/
